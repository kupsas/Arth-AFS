version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: arth_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: arth_db
      POSTGRES_USER: arth_user
      POSTGRES_PASSWORD: arth_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arth_user -d arth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Arth Application
  app:
    build: .
    container_name: arth_app
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://arth_user:arth_password@db:5432/arth_db
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src:ro
      - ./alembic:/app/alembic:ro
      - ./scripts:/app/scripts:ro
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
      "

  # Redis for caching (optional, for future use)
  redis:
    image: redis:7-alpine
    container_name: arth_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: arth_network 