# Fly.io config template for the single-container demo (`Dockerfile.demo`).
# Copy to `fly.toml`, set a unique `app` name, then: `fly deploy --dockerfile Dockerfile.demo`
#
# Docs: https://fly.io/docs/reference/configuration/

app = "arth-demo-rename-me"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile.demo"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
