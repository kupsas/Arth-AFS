# fly.toml app configuration file generated for arth-demo on 2026-05-12T04:11:13+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'arth-demo'
primary_region = 'bom'

[build]
  dockerfile = 'Dockerfile.demo'
  [build.args]
    NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN = "phc_vG5JZXyDBeMkNbBNJqGhKB6uCN9bxot8FCR6RwTNsPm2"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  # After the first ``fly-replay`` for a given ``demo_session_id`` cookie value, Fly
  # Proxy routes subsequent requests (including WebSocket upgrades) to the same
  # Machine without another app hop. See ``DEMO_FLY_INSTANCE_COOKIE`` in ``api/demo.py``.
  [[http_service.http_options.replay_cache]]
    path_prefix = "/"
    ttl_seconds = 86400
    type = "cookie"
    name = "demo_session_id"

  # Caddy answers this path immediately; / can still 502 while Next.js boots.
  [[http_service.checks]]
    grace_period = "45s"
    interval = "30s"
    method = "GET"
    path = "/fly-healthz"
    timeout = "10s"

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048
